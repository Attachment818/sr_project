# 3409 vessel_only(w=0.3) 的 FIMD 统一协议重测。
# 仅重新评估既有 ep149 权重；不训练、不覆盖旧 fimd_seed3409_vessel_only_w03 结果。
FIMD:
  data_root: /home/data1/zhangjunhong/sr_project/sr/data/FIMD

PREDICT:
  device: cuda:0
  model_type: with_vessel_only
  model_save_path: /home/data1/zhangjunhong/sr_project/sr/save/seed3409_vessel_only_w03_ep149.pth

  # FIMD 的统一跨设备/分辨率评估协议。
  resize_refer_to_query: true
  model_image_width: 768
  model_image_height: 768
  use_matching_trick: true

  registration_method: quadratic
  displacement_threshold: 300.0
  nms_size: 10
  nms_thresh: 0.01
  knn_thresh: 0.9

  use_inverse_consistency: true
  iccl: 3.0
  use_outlier_filter: true
  outlier_criteria: homography
  outlier_threshold: 20.0

  # FIMD 不使用 FIRE 眼底有效视野 mask。
  eye_mask_path: null
  checkerboard_tile_size: 240
