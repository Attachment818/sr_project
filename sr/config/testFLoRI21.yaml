PREDICT:
  # Device for inference
  device: cuda:0

  # Path to baseline SuperRetina model (no extra modules)
  # TODO: replace with your actual .pth path
  model_save_path: ./save/SuperRetina.pth

  # Use original SuperRetina (no FPN/attention/etc.)
  model_type: original

  # Input resolution for the model
  model_image_width: 768
  model_image_height: 768

  # Do not use matching tricks or extra post-processing
  use_matching_trick: False

  # NMS and matching thresholds (copy from your default config if needed)
  nms_size: 10
  nms_thresh: 0.01
  knn_thresh: 0.9

  # No inverse consistency check / outlier filtering for baseline
  use_inverse_consistency: False
  iccl: 3.0

  use_outlier_filter: False
  outlier_criteria: homography
  outlier_threshold: 20.0

  # Eye mask is not used for FLoRI21 (will be forced to None in script)
  eye_mask_path: null

