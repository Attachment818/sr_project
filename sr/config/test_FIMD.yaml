PREDICT:
  # Device for inference
  device: cuda:0

  # Path to baseline SuperRetina model (no extra modules)
  # TODO: replace with your actual .pth path
  model_save_path: ./save/model_6-2.pth

  # Use original SuperRetina (no FPN/attention/etc.)
  model_type: original

  # Input resolution for the model
  model_image_width: 768
  model_image_height: 768

  # Do not use matching tricks or extra post-processing in this baseline
  use_matching_trick: True

  # Registration method selection
  # Options: 'homography' or 'quadratic' or 'auto'
  #   - 'homography': Always use homography transformation (requires at least 4 points)
  #   - 'quadratic': Always use quadratic polynomial transformation (requires at least 6 points)
  #   - 'auto': Automatically select based on displacement threshold (default)
  registration_method: 'homography'
  
  # Displacement threshold for automatic registration method selection (in pixels)
  # Only used when registration_method is 'auto'
  # The system will:
  #   - Calculate the average displacement between matched keypoints
  #   - If displacement > threshold: use quadratic polynomial transformation
  #   - If displacement <= threshold: use homography transformation
  # Default: 50.0 pixels
  # displacement_threshold: 50.0

  # NMS and matching thresholds (copy from your default config if needed)
  nms_size: 10
  nms_thresh: 0.01
  knn_thresh: 0.9

  # No inverse consistency check / outlier filtering for baseline
  use_inverse_consistency: True
  iccl: 3.0

  use_outlier_filter: True
  outlier_criteria: homography
  outlier_threshold: 20.0

  # Eye mask is not used for FIMD
  eye_mask_path: null

